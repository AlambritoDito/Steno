<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steno</title>

<!-- CodeMirror 6 from CDN -->
<script src="https://cdn.jsdelivr.net/npm/@codemirror/lang-markdown@6/dist/index.cjs.min.js" type="module"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@codemirror/view@6/dist/index.css">

<!-- marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

<style>
/* ========== Reset & Variables ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg-canvas: #f5f5f7;
    --bg-primary: #ffffff;
    --bg-secondary: #f2f2f7;
    --bg-tertiary: #e5e5ea;
    --bg-elevated: #ffffff;

    --text-primary: #1d1d1f;
    --text-secondary: #86868b;
    --text-muted: #aeaeb2;

    --accent: #007aff;
    --accent-hover: #0071e3;
    --accent-bg: rgba(0, 122, 255, 0.08);
    --accent-bg-hover: rgba(0, 122, 255, 0.14);

    --red: #ff3b30;
    --red-bg: rgba(255, 59, 48, 0.1);
    --green: #34c759;
    --green-bg: rgba(52, 199, 89, 0.1);
    --yellow: #ff9f0a;
    --yellow-bg: rgba(255, 159, 10, 0.12);

    --border: rgba(0, 0, 0, 0.06);
    --border-strong: rgba(0, 0, 0, 0.1);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);

    --sidebar-bg: rgba(255, 255, 255, 0.72);
    --sidebar-hover: rgba(0, 0, 0, 0.04);

    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;

    --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, monospace;

    --transition: 200ms ease;
    --transition-slow: 350ms cubic-bezier(0.25, 0.1, 0.25, 1);
}

/* ========== Dark Mode ========== */
@media (prefers-color-scheme: dark) {
    :root {
        --bg-canvas: #000000;
        --bg-primary: #1c1c1e;
        --bg-secondary: #2c2c2e;
        --bg-tertiary: #3a3a3c;
        --bg-elevated: #2c2c2e;

        --text-primary: #f5f5f7;
        --text-secondary: #98989d;
        --text-muted: #636366;

        --accent: #0a84ff;
        --accent-hover: #409cff;
        --accent-bg: rgba(10, 132, 255, 0.14);
        --accent-bg-hover: rgba(10, 132, 255, 0.22);

        --red: #ff453a;
        --red-bg: rgba(255, 69, 58, 0.18);
        --green: #30d158;
        --green-bg: rgba(48, 209, 88, 0.18);
        --yellow: #ffd60a;
        --yellow-bg: rgba(255, 214, 10, 0.18);

        --border: rgba(255, 255, 255, 0.06);
        --border-strong: rgba(255, 255, 255, 0.1);
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);

        --sidebar-bg: rgba(28, 28, 30, 0.72);
        --sidebar-hover: rgba(255, 255, 255, 0.06);
    }
}

html, body {
    height: 100%;
    background: var(--bg-canvas);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.47;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ========== Layout ========== */
.app {
    display: flex;
    height: 100vh;
}

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg-canvas);
}

/* ========== Sidebar ========== */
.sidebar {
    width: 280px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width var(--transition-slow), opacity var(--transition-slow);
    overflow: hidden;
    flex-shrink: 0;
}

.sidebar.collapsed {
    width: 0;
    border-right: none;
    opacity: 0;
}

.sidebar-header {
    padding: 20px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.sidebar-header h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
}

.sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
}

.sidebar-item {
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background var(--transition);
    margin-bottom: 1px;
}

.sidebar-item:hover {
    background: var(--sidebar-hover);
}

.sidebar-item:active {
    background: var(--accent-bg);
}

.sidebar-item .session-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sidebar-item .session-date {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
}

.sidebar-empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
}

/* ========== Header ========== */
.header {
    height: 52px;
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.sidebar-toggle {
    width: 32px;
    height: 32px;
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    font-size: 18px;
}

.sidebar-toggle:hover {
    background: var(--bg-secondary);
    color: var(--text-primary);
}

.logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.03em;
}

.logo-dot {
    color: var(--accent);
}

.header-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.session-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
}

.session-clock {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    background: var(--bg-secondary);
    padding: 2px 10px;
    border-radius: 99px;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.connection-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background var(--transition);
}

.connection-dot.connected {
    background: var(--green);
    box-shadow: 0 0 6px rgba(52, 199, 89, 0.4);
}

.connection-dot.disconnected {
    background: var(--red);
    box-shadow: 0 0 6px rgba(255, 59, 48, 0.4);
}

.lang-toggle {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 4px 12px;
    border-radius: 99px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    transition: all var(--transition);
}

.lang-toggle:hover {
    color: var(--text-primary);
    background: var(--bg-tertiary);
}

/* ========== Two-Column Layout ========== */
.panels {
    flex: 1;
    display: flex;
    overflow: hidden;
    padding: 12px;
    gap: 12px;
    background: var(--bg-canvas);
}

.panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
}

.panel-left {
    border-right: none;
}

.panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
}

.panel-header h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

/* ========== Buttons ========== */
.btn {
    border: none;
    padding: 7px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-sans);
}

.btn-primary {
    background: var(--accent);
    color: #ffffff;
}

.btn-primary:hover {
    background: var(--accent-hover);
    transform: scale(1.02);
}

.btn-primary:active {
    transform: scale(0.98);
}

.btn-danger {
    background: var(--red);
    color: #ffffff;
}

.btn-danger:hover {
    background: #e8342a;
    transform: scale(1.02);
}

.btn-danger:active {
    transform: scale(0.98);
}

.btn-ghost {
    background: transparent;
    color: var(--accent);
    font-weight: 500;
}

.btn-ghost:hover {
    background: var(--accent-bg);
}

/* ========== Transcript Panel ========== */
.controls {
    display: flex;
    align-items: center;
    gap: 8px;
}

.mic-select {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    max-width: 180px;
    font-family: var(--font-sans);
    outline: none;
    cursor: pointer;
    transition: border-color var(--transition);
}

.mic-select:focus {
    border-color: var(--accent);
}

.status-badge {
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
    color: var(--text-secondary);
}

.status-badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
}

.status-badge .dot.green {
    background: var(--green);
    box-shadow: 0 0 6px rgba(52, 199, 89, 0.4);
}

.status-badge .dot.red {
    background: var(--red);
    box-shadow: 0 0 6px rgba(255, 59, 48, 0.4);
}

.status-badge .dot.gray {
    background: var(--text-muted);
}

.audio-level {
    height: 3px;
    background: var(--bg-secondary);
    border-radius: 99px;
    margin: 0 20px;
    overflow: hidden;
    flex-shrink: 0;
}

.audio-level-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--accent));
    border-radius: 99px;
    width: 0%;
    transition: width 100ms ease;
}

.transcript-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
}

.transcript-entry {
    margin-bottom: 8px;
    padding: 10px 14px;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    animation: slideUp 300ms cubic-bezier(0.25, 0.1, 0.25, 1);
}

.transcript-entry .timestamp {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    margin-right: 10px;
    font-weight: 500;
}

.transcript-entry .text {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.5;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ========== Notes Panel ========== */
.notes-toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
}

.toolbar-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    padding: 5px 9px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    transition: all var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--font-sans);
}

.toolbar-btn:hover {
    color: var(--text-primary);
    background: var(--bg-secondary);
}

.toolbar-btn.active {
    color: var(--accent);
    background: var(--accent-bg);
}

.toolbar-separator {
    width: 1px;
    height: 18px;
    background: var(--border-strong);
    margin: 0 4px;
}

.editor-area {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

#editor-container {
    flex: 1;
    overflow: auto;
}

#editor-container .cm-editor {
    height: 100%;
    background: var(--bg-primary);
}

#editor-container .cm-content {
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--text-primary);
    padding: 16px 20px;
    caret-color: var(--accent);
}

#editor-container .cm-gutters {
    background: var(--bg-primary);
    border-right: 1px solid var(--border);
    color: var(--text-muted);
}

#editor-container .cm-activeLine {
    background: var(--accent-bg);
}

#editor-container .cm-selectionBackground {
    background: rgba(0, 122, 255, 0.15) !important;
}

@media (prefers-color-scheme: dark) {
    #editor-container .cm-selectionBackground {
        background: rgba(10, 132, 255, 0.2) !important;
    }
}

#editor-container .cm-cursor {
    border-left-color: var(--accent);
}

#editor-container .cm-scroller {
    overflow: auto;
}

#preview-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: none;
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.6;
}

#preview-container img {
    max-width: 100%;
    border-radius: var(--radius);
    cursor: pointer;
    margin: 8px 0;
}

#preview-container h1, #preview-container h2, #preview-container h3 {
    color: var(--text-primary);
    margin: 20px 0 8px 0;
    font-weight: 700;
    letter-spacing: -0.02em;
}

#preview-container h1 { font-size: 24px; }
#preview-container h2 { font-size: 20px; }
#preview-container h3 { font-size: 17px; }

#preview-container p {
    margin-bottom: 12px;
}

#preview-container code {
    background: var(--bg-secondary);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 13px;
}

#preview-container pre {
    background: var(--bg-secondary);
    padding: 16px;
    border-radius: var(--radius);
    overflow-x: auto;
    margin: 12px 0;
}

#preview-container pre code {
    background: none;
    padding: 0;
}

#preview-container ul, #preview-container ol {
    padding-left: 24px;
    margin-bottom: 12px;
}

#preview-container li {
    margin-bottom: 4px;
}

#preview-container blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    margin: 12px 0;
    color: var(--text-secondary);
}

.panel-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}

.privacy-note {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
}

/* ========== Modal ========== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 200ms ease;
}

.modal-overlay.hidden { display: none; }

.modal {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 36px;
    width: 440px;
    max-width: 90vw;
    box-shadow: var(--shadow-lg);
    animation: modalIn 300ms cubic-bezier(0.25, 0.1, 0.25, 1);
}

.modal h2 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
}

.modal .tagline {
    color: var(--text-secondary);
    font-size: 15px;
    margin-bottom: 28px;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
}

.form-group input,
.form-group select {
    width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border-strong);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 15px;
    font-family: var(--font-sans);
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
}

.form-group input:focus,
.form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
}

.form-group input::placeholder {
    color: var(--text-muted);
}

.modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
}

.modal-actions .btn {
    flex: 1;
    justify-content: center;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    border-radius: var(--radius);
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

/* ========== Confirm Dialog ========== */
.confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1001;
    animation: fadeIn 200ms ease;
}

.confirm-overlay.hidden { display: none; }

.confirm-dialog {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 28px;
    width: 380px;
    max-width: 90vw;
    box-shadow: var(--shadow-lg);
    animation: modalIn 300ms cubic-bezier(0.25, 0.1, 0.25, 1);
}

.confirm-dialog p {
    margin-bottom: 20px;
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.5;
}

.confirm-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
}

.confirm-actions .btn {
    padding: 8px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
}

/* ========== Recording Pulse ========== */
#record-btn {
    position: relative;
}

#record-btn.btn-danger::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: var(--radius-sm);
    background: var(--red);
    opacity: 0;
    animation: recordPulse 2s ease-in-out infinite;
    pointer-events: none;
}

@keyframes recordPulse {
    0%, 100% { opacity: 0; transform: scale(1); }
    50% { opacity: 0.15; transform: scale(1.06); }
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ========== Responsive ========== */
@media (max-width: 768px) {
    .sidebar { width: 0; border-right: none; opacity: 0; }
    .sidebar:not(.collapsed) { width: 280px; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; opacity: 1; }
    .panels { flex-direction: column; padding: 8px; gap: 8px; }
    .panel-left { border-right: none; }
    .header { padding: 0 12px; }
    .panel-header { padding: 12px 14px; flex-wrap: wrap; }
    .controls { width: 100%; justify-content: flex-end; margin-top: 8px; }
}
</style>
</head>
<body>

<div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebar-title">Sessions</h2>
            <button class="toolbar-btn" onclick="showNewSessionModal()" title="New" style="font-size:20px;color:var(--accent);">+</button>
        </div>
        <div class="sidebar-list" id="sessions-list">
            <div class="sidebar-empty" id="no-sessions">No sessions yet</div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <rect x="2" y="4" width="14" height="1.5" rx="0.75" fill="currentColor"/>
                        <rect x="2" y="8.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
                        <rect x="2" y="12.5" width="14" height="1.5" rx="0.75" fill="currentColor"/>
                    </svg>
                </button>
                <span class="logo">Steno<span class="logo-dot">.</span></span>
            </div>
            <div class="header-center">
                <span class="session-title" id="session-title">&mdash;</span>
                <span class="session-clock" id="session-clock">00:00:00</span>
            </div>
            <div class="header-right">
                <span class="connection-dot" id="connection-dot"></span>
                <button class="lang-toggle" id="lang-toggle" onclick="toggleLanguage()">EN</button>
            </div>
        </header>

        <!-- Panels -->
        <div class="panels">
            <!-- Left: Transcript -->
            <div class="panel panel-left">
                <div class="panel-header">
                    <div class="status-badge" id="status-badge">
                        <span class="dot gray"></span>
                        <span id="status-text">No active session</span>
                    </div>
                    <div class="controls">
                        <select class="mic-select" id="mic-select"></select>
                        <button class="btn btn-primary" id="record-btn" onclick="toggleRecording()" disabled>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                <line x1="12" y1="19" x2="12" y2="23"/>
                                <line x1="8" y1="23" x2="16" y2="23"/>
                            </svg>
                            <span id="record-btn-text">Start Recording</span>
                        </button>
                    </div>
                </div>
                <div class="audio-level">
                    <div class="audio-level-bar" id="audio-level-bar"></div>
                </div>
                <div class="transcript-area" id="transcript-area"></div>
            </div>

            <!-- Right: Notes -->
            <div class="panel panel-right">
                <div class="panel-header">
                    <h3 id="notes-title">Notes</h3>
                    <div class="notes-toolbar">
                        <button class="toolbar-btn" onclick="insertFormat('**', '**')" title="Bold"><b>B</b></button>
                        <button class="toolbar-btn" onclick="insertFormat('*', '*')" title="Italic"><i>I</i></button>
                        <button class="toolbar-btn" onclick="insertFormat('`', '`')" title="Code"><code style="font-size:12px">&lt;/&gt;</code></button>
                        <span class="toolbar-separator"></span>
                        <label class="toolbar-btn" title="Insert image" id="insert-image-label" style="cursor:pointer">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <input type="file" accept="image/*" style="display:none" id="image-input" onchange="handleImageUpload(event)">
                        </label>
                        <span class="toolbar-separator"></span>
                        <button class="toolbar-btn" id="btn-save-note" onclick="saveNote()"><span data-i18n="save_note">Save</span></button>
                        <button class="toolbar-btn" id="btn-preview" onclick="togglePreview()"><span data-i18n="preview">Preview</span></button>
                    </div>
                </div>
                <div class="editor-area">
                    <div id="editor-container"></div>
                    <div id="preview-container"></div>
                </div>
                <div class="panel-footer">
                    <span class="privacy-note" id="privacy-note">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3-9H9V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2z"/></svg>
                        All processing is local. No data leaves your machine.
                    </span>
                    <button class="btn btn-ghost" id="export-btn" onclick="exportSession()" disabled>
                        <span data-i18n="export_session">Export (.md)</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- New Session Modal -->
<div class="modal-overlay" id="session-modal">
    <div class="modal">
        <h2 id="modal-title">New Session</h2>
        <p class="tagline" id="modal-tagline">Real-time transcription for classes & meetings</p>
        <div class="form-group">
            <label data-i18n="new_session" for="session-name-input">Session name</label>
            <input type="text" id="session-name-input" placeholder="e.g. Physics — Thermodynamics">
        </div>
        <div class="form-group">
            <label data-i18n="select_microphone" for="modal-mic-select">Select microphone</label>
            <select id="modal-mic-select"></select>
        </div>
        <div class="form-group">
            <label data-i18n="language" for="modal-lang-select">Language</label>
            <select id="modal-lang-select">
                <option value="en">English</option>
                <option value="es">Espa&ntilde;ol</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-primary" onclick="startSession()" id="start-session-btn">Start Session</button>
        </div>
        <p class="privacy-note" style="margin-top:20px;justify-content:center" id="modal-privacy">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3-9H9V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2z"/></svg>
            All processing is local. No data leaves your machine.
        </p>
    </div>
</div>

<!-- Confirm Delete Dialog -->
<div class="confirm-overlay hidden" id="confirm-overlay">
    <div class="confirm-dialog">
        <p id="confirm-message">Are you sure?</p>
        <div class="confirm-actions">
            <button class="btn btn-ghost" onclick="hideConfirm()" id="confirm-cancel-btn">Cancel</button>
            <button class="btn btn-danger" onclick="confirmAction()" id="confirm-delete-btn">Delete</button>
        </div>
    </div>
</div>

<!-- CodeMirror 6 via ESM CDN -->
<script type="module">
import {EditorView, basicSetup} from "https://cdn.jsdelivr.net/npm/codemirror@6/dist/index.js";
import {markdown} from "https://cdn.jsdelivr.net/npm/@codemirror/lang-markdown@6/dist/index.js";
import {EditorState} from "https://cdn.jsdelivr.net/npm/@codemirror/state@6/dist/index.js";

const customTheme = EditorView.theme({
    "&": { backgroundColor: "transparent" },
    ".cm-content": {
        fontFamily: "-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif",
        fontSize: "14px",
    },
    ".cm-gutters": { border: "none" },
    "&.cm-focused .cm-selectionBackground, .cm-selectionBackground": { backgroundColor: "rgba(0,122,255,0.12)" },
    ".cm-activeLine": { backgroundColor: "rgba(0,122,255,0.04)" },
    ".cm-cursor": { borderLeftColor: "#007aff" },
});

const state = EditorState.create({
    doc: "",
    extensions: [
        basicSetup,
        markdown(),
        customTheme,
        EditorView.lineWrapping,
    ],
});

const editor = new EditorView({
    state,
    parent: document.getElementById("editor-container"),
});

// Expose editor globally
window.cmEditor = editor;

// Drag & drop images onto editor
editor.dom.addEventListener("dragover", (e) => { e.preventDefault(); });
editor.dom.addEventListener("drop", (e) => {
    e.preventDefault();
    const files = e.dataTransfer?.files;
    if (files && files.length > 0) {
        for (const file of files) {
            if (file.type.startsWith("image/")) {
                uploadImageFile(file);
            }
        }
    }
});
</script>

<script>
/* ========== Global State ========== */
let t = {};
let currentLang = "en";
let currentSessionId = null;
let ws = null;
let isRecording = false;
let isPreviewMode = false;
let reconnectTimeout = null;
let reconnectDelay = 1000;
let clockInterval = null;
let sessionStartTime = null;
let pendingConfirmAction = null;

/* ========== i18n ========== */
async function loadI18n(lang) {
    try {
        const resp = await fetch(`/api/i18n/${lang}`);
        t = await resp.json();
        currentLang = lang;
        applyI18n();
    } catch (e) {
        console.error("Failed to load i18n:", e);
    }
}

function applyI18n() {
    // Update elements with data-i18n attribute
    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (t[key]) el.textContent = t[key];
    });

    // Update specific elements
    document.getElementById("sidebar-title").textContent = t.sessions || "Sessions";
    document.getElementById("no-sessions").textContent = t.no_sessions_yet || "No sessions yet";
    document.getElementById("modal-title").textContent = t.new_session || "New Session";
    document.getElementById("modal-tagline").textContent = t.tagline || "";
    document.getElementById("session-name-input").placeholder = t.session_name_placeholder || "";
    document.getElementById("start-session-btn").textContent = t.start_session || "Start Session";
    document.getElementById("notes-title").textContent = "Notes";
    document.getElementById("insert-image-label").title = t.insert_image || "Insert image";
    document.getElementById("confirm-cancel-btn").textContent = t.cancel || "Cancel";
    document.getElementById("confirm-delete-btn").textContent = t.delete || "Delete";

    // Update lang toggle button
    document.getElementById("lang-toggle").textContent = currentLang.toUpperCase();

    // Update status & record button
    updateStatusUI();
    updateRecordButton();
}

function toggleLanguage() {
    const newLang = currentLang === "en" ? "es" : "en";
    loadI18n(newLang);
}

/* ========== Devices ========== */
async function loadDevices() {
    try {
        const resp = await fetch("/api/devices");
        const devices = await resp.json();
        const selects = [document.getElementById("mic-select"), document.getElementById("modal-mic-select")];
        selects.forEach(select => {
            select.innerHTML = "";
            devices.forEach(d => {
                const opt = document.createElement("option");
                opt.value = d.index;
                opt.textContent = d.name;
                select.appendChild(opt);
            });
            if (devices.length === 0) {
                const opt = document.createElement("option");
                opt.textContent = t.select_microphone || "No microphone found";
                select.appendChild(opt);
            }
        });
    } catch (e) {
        console.error("Failed to load devices:", e);
    }
}

/* ========== Sessions ========== */
async function loadSessions() {
    try {
        const resp = await fetch("/api/sessions");
        const sessions = await resp.json();
        const list = document.getElementById("sessions-list");
        const empty = document.getElementById("no-sessions");

        if (sessions.length === 0) {
            list.innerHTML = "";
            list.appendChild(empty);
            empty.style.display = "";
            return;
        }

        empty.style.display = "none";
        list.innerHTML = "";

        sessions.forEach(s => {
            const item = document.createElement("div");
            item.className = "sidebar-item";
            item.innerHTML = `
                <div class="session-name">${escapeHtml(s.name)}</div>
                <div class="session-date">${s.created_at ? new Date(s.created_at).toLocaleDateString() : ""} · ${s.size_kb} KB</div>
            `;
            item.onclick = () => viewSession(s.id);

            // Right-click to delete
            item.oncontextmenu = (e) => {
                e.preventDefault();
                showConfirm(t.confirm_delete || "Are you sure you want to delete this session?", () => deleteSession(s.id));
            };

            list.appendChild(item);
        });
    } catch (e) {
        console.error("Failed to load sessions:", e);
    }
}

async function deleteSession(id) {
    try {
        await fetch(`/api/sessions/${id}`, { method: "DELETE" });
        loadSessions();
    } catch (e) {
        console.error("Failed to delete session:", e);
    }
}

async function viewSession(id) {
    try {
        const resp = await fetch(`/api/sessions/${id}`);
        const md = await resp.text();
        const previewEl = document.getElementById("preview-container");
        previewEl.innerHTML = marked.parse(md);
        showPreview(true);
    } catch (e) {
        console.error("Failed to view session:", e);
    }
}

function showNewSessionModal() {
    document.getElementById("session-modal").classList.remove("hidden");
}

async function startSession() {
    const name = document.getElementById("session-name-input").value.trim();
    if (!name) {
        document.getElementById("session-name-input").focus();
        return;
    }

    // Apply selected language
    const langSelect = document.getElementById("modal-lang-select");
    if (langSelect.value !== currentLang) {
        await loadI18n(langSelect.value);
    }

    try {
        const resp = await fetch("/api/sessions/new", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
        });
        const data = await resp.json();
        currentSessionId = data.session_id;

        // Update UI
        document.getElementById("session-title").textContent = name;
        document.getElementById("session-modal").classList.add("hidden");
        document.getElementById("record-btn").disabled = false;
        document.getElementById("export-btn").disabled = false;

        // Start clock
        sessionStartTime = new Date();
        startClock();

        // Connect WebSocket
        connectWebSocket();

        // Reload sidebar
        loadSessions();

        // Sync mic selection
        const micSelect = document.getElementById("mic-select");
        const modalMic = document.getElementById("modal-mic-select");
        micSelect.value = modalMic.value;

    } catch (e) {
        console.error("Failed to create session:", e);
    }
}

/* ========== WebSocket ========== */
function connectWebSocket() {
    if (!currentSessionId) return;

    const protocol = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${protocol}//${location.host}/ws/${currentSessionId}`);

    ws.onopen = () => {
        reconnectDelay = 1000;
        setConnectionStatus(true);
    };

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleWSMessage(msg);
    };

    ws.onclose = () => {
        setConnectionStatus(false);
        scheduleReconnect();
    };

    ws.onerror = () => {
        ws.close();
    };
}

function scheduleReconnect() {
    if (!currentSessionId) return;
    if (reconnectTimeout) clearTimeout(reconnectTimeout);
    reconnectTimeout = setTimeout(() => {
        connectWebSocket();
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    }, reconnectDelay);
}

function handleWSMessage(msg) {
    switch (msg.type) {
        case "transcript":
            addTranscriptEntry(msg.text, msg.timestamp);
            break;
        case "status":
            isRecording = msg.recording;
            updateStatusUI();
            updateRecordButton();
            break;
        case "model_loading":
            setModelStatus("loading");
            break;
        case "model_ready":
            setModelStatus("ready");
            break;
        case "error":
            console.error("WS error:", msg.message);
            break;
        case "pong":
            break;
    }
}

function setConnectionStatus(connected) {
    const dot = document.getElementById("connection-dot");
    dot.className = "connection-dot " + (connected ? "connected" : "disconnected");
}

function setModelStatus(status) {
    const badge = document.getElementById("status-badge");
    const text = document.getElementById("status-text");
    if (status === "loading") {
        badge.querySelector(".dot").className = "dot";
        badge.querySelector(".dot").style.background = "var(--yellow)";
        text.textContent = t.model_loading || "Loading model...";
    } else if (status === "ready") {
        badge.querySelector(".dot").className = "dot green";
        badge.querySelector(".dot").style.background = "";
        text.textContent = t.model_ready || "Model ready";
    }
}

/* ========== Recording ========== */
function toggleRecording() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    if (isRecording) {
        ws.send(JSON.stringify({ type: "stop" }));
    } else {
        const deviceIndex = parseInt(document.getElementById("mic-select").value);
        ws.send(JSON.stringify({ type: "start", device_index: isNaN(deviceIndex) ? null : deviceIndex }));
    }
}

function updateRecordButton() {
    const btn = document.getElementById("record-btn");
    const text = document.getElementById("record-btn-text");
    if (isRecording) {
        btn.className = "btn btn-danger";
        text.textContent = t.stop_recording || "Stop Recording";
    } else {
        btn.className = "btn btn-primary";
        text.textContent = t.start_recording || "Start Recording";
    }
}

function updateStatusUI() {
    const dot = document.getElementById("status-badge").querySelector(".dot");
    const text = document.getElementById("status-text");

    if (!currentSessionId) {
        dot.className = "dot gray";
        text.textContent = t.no_session || "No active session";
    } else if (isRecording) {
        dot.className = "dot green";
        text.textContent = t.listening || "Listening";
    } else {
        dot.className = "dot red";
        text.textContent = t.paused || "Paused";
    }
}

/* ========== Transcript ========== */
function addTranscriptEntry(text, timestamp) {
    const area = document.getElementById("transcript-area");
    const entry = document.createElement("div");
    entry.className = "transcript-entry";
    entry.innerHTML = `<span class="timestamp">[${escapeHtml(timestamp)}]</span><span class="text">${escapeHtml(text)}</span>`;
    area.appendChild(entry);
    area.scrollTop = area.scrollHeight;
}

/* ========== Notes ========== */
function insertFormat(before, after) {
    const editor = window.cmEditor;
    if (!editor) return;

    const { from, to } = editor.state.selection.main;
    const selectedText = editor.state.sliceDoc(from, to);
    const replacement = before + selectedText + after;

    editor.dispatch({
        changes: { from, to, insert: replacement },
        selection: { anchor: from + before.length, head: from + before.length + selectedText.length },
    });
    editor.focus();
}

async function saveNote() {
    if (!currentSessionId) return;
    const editor = window.cmEditor;
    if (!editor) return;

    const md = editor.state.doc.toString();
    if (!md.trim()) return;

    try {
        await fetch(`/api/sessions/${currentSessionId}/note`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ markdown: md }),
        });
    } catch (e) {
        console.error("Failed to save note:", e);
    }
}

function togglePreview() {
    isPreviewMode = !isPreviewMode;
    showPreview(isPreviewMode);
}

function showPreview(show) {
    const editorContainer = document.getElementById("editor-container");
    const previewContainer = document.getElementById("preview-container");
    const previewBtn = document.getElementById("btn-preview");

    if (show) {
        const editor = window.cmEditor;
        const md = editor ? editor.state.doc.toString() : "";
        previewContainer.innerHTML = marked.parse(md);
        editorContainer.style.display = "none";
        previewContainer.style.display = "block";
        previewBtn.querySelector("span").textContent = t.edit || "Edit";
        isPreviewMode = true;
    } else {
        editorContainer.style.display = "block";
        previewContainer.style.display = "none";
        previewBtn.querySelector("span").textContent = t.preview || "Preview";
        isPreviewMode = false;
    }
}

/* ========== Image Upload ========== */
function handleImageUpload(event) {
    const file = event.target.files[0];
    if (file) uploadImageFile(file);
    event.target.value = "";
}

async function uploadImageFile(file) {
    if (!currentSessionId) return;

    const formData = new FormData();
    formData.append("file", file);
    formData.append("caption", file.name);

    try {
        const resp = await fetch(`/api/sessions/${currentSessionId}/image`, {
            method: "POST",
            body: formData,
        });
        const data = await resp.json();

        // Insert the markdown tag into the editor
        const editor = window.cmEditor;
        if (editor && data.tag) {
            const pos = editor.state.selection.main.head;
            editor.dispatch({
                changes: { from: pos, insert: "\n" + data.tag + "\n" },
            });
        }
    } catch (e) {
        console.error("Failed to upload image:", e);
    }
}

/* ========== Export ========== */
async function exportSession() {
    if (!currentSessionId) return;

    try {
        const resp = await fetch(`/api/sessions/${currentSessionId}/export`, { method: "POST" });
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${currentSessionId}.md`;
        a.click();
        URL.revokeObjectURL(url);
    } catch (e) {
        console.error("Failed to export session:", e);
    }
}

/* ========== Clock ========== */
function startClock() {
    if (clockInterval) clearInterval(clockInterval);
    clockInterval = setInterval(() => {
        if (!sessionStartTime) return;
        const elapsed = Math.floor((Date.now() - sessionStartTime.getTime()) / 1000);
        const h = String(Math.floor(elapsed / 3600)).padStart(2, "0");
        const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, "0");
        const s = String(elapsed % 60).padStart(2, "0");
        document.getElementById("session-clock").textContent = `${h}:${m}:${s}`;
    }, 1000);
}

/* ========== Sidebar ========== */
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
}

/* ========== Confirm Dialog ========== */
function showConfirm(message, action) {
    document.getElementById("confirm-message").textContent = message;
    document.getElementById("confirm-overlay").classList.remove("hidden");
    pendingConfirmAction = action;
}

function hideConfirm() {
    document.getElementById("confirm-overlay").classList.add("hidden");
    pendingConfirmAction = null;
}

function confirmAction() {
    if (pendingConfirmAction) pendingConfirmAction();
    hideConfirm();
}

/* ========== Utility ========== */
function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
}

/* ========== Init ========== */
async function init() {
    // Detect language
    const browserLang = (navigator.language || "en").split("-")[0];
    const lang = ["en", "es"].includes(browserLang) ? browserLang : "en";

    // Set modal language selector
    document.getElementById("modal-lang-select").value = lang;

    // Load i18n and devices in parallel
    await Promise.all([
        loadI18n(lang),
        loadDevices(),
        loadSessions(),
    ]);
}

init();
</script>
