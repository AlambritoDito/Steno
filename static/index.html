<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steno</title>

<!-- CodeMirror 6 from CDN -->
<script src="https://cdn.jsdelivr.net/npm/@codemirror/lang-markdown@6/dist/index.cjs.min.js" type="module"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@codemirror/view@6/dist/index.css">

<!-- marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

<style>
/* ========== CSS Reset & Variables ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --border: #30363d;
    --red: #f85149;
    --green: #3fb950;
    --yellow: #d29922;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --radius: 6px;
    --transition: 150ms ease;
}

html, body {
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
}

/* ========== Layout ========== */
.app {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 260px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width var(--transition);
    overflow: hidden;
    flex-shrink: 0;
}

.sidebar.collapsed {
    width: 0;
    border-right: none;
}

.sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.sidebar-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
}

.sidebar-item {
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background var(--transition);
    margin-bottom: 2px;
}

.sidebar-item:hover {
    background: var(--bg-tertiary);
}

.sidebar-item .session-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sidebar-item .session-date {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
}

.sidebar-empty {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
}

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

/* ========== Header ========== */
.header {
    height: 48px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.sidebar-toggle {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    border-radius: var(--radius);
    transition: color var(--transition);
}

.sidebar-toggle:hover { color: var(--text-primary); }

.logo {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
}

.header-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.session-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
}

.session-clock {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-secondary);
}

.header-right {
    display: flex;
    align-items: center;
    gap: 8px;
}

.connection-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
}

.connection-dot.connected { background: var(--green); }
.connection-dot.disconnected { background: var(--red); }

.lang-toggle {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 4px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px;
    transition: all var(--transition);
}

.lang-toggle:hover {
    color: var(--text-primary);
    border-color: var(--accent);
}

/* ========== Two-Column Layout ========== */
.panels {
    flex: 1;
    display: flex;
    overflow: hidden;
}

.panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

.panel-left {
    border-right: 1px solid var(--border);
}

.panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
}

.panel-header h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
}

/* ========== Transcript Panel ========== */
.controls {
    display: flex;
    align-items: center;
    gap: 8px;
}

.mic-select {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 4px 8px;
    border-radius: var(--radius);
    font-size: 12px;
    max-width: 200px;
}

.btn {
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
}

.btn-primary:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
}

.btn-danger {
    background: transparent;
    color: var(--red);
    border-color: var(--red);
}

.btn-danger:hover {
    background: rgba(248, 81, 73, 0.1);
}

.btn-ghost {
    background: transparent;
    color: var(--text-secondary);
}

.btn-ghost:hover {
    color: var(--text-primary);
    background: var(--bg-tertiary);
}

.status-badge {
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
}

.status-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
}

.status-badge .dot.green { background: var(--green); }
.status-badge .dot.red { background: var(--red); }
.status-badge .dot.gray { background: var(--text-muted); }

.audio-level {
    height: 4px;
    background: var(--bg-tertiary);
    border-radius: 2px;
    margin: 0 16px;
    overflow: hidden;
    flex-shrink: 0;
}

.audio-level-bar {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    width: 0%;
    transition: width 100ms ease;
}

.transcript-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
}

.transcript-entry {
    margin-bottom: 12px;
    animation: fadeIn 300ms ease;
}

.transcript-entry .timestamp {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    margin-right: 8px;
}

.transcript-entry .text {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.6;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ========== Notes Panel ========== */
.notes-toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
}

.toolbar-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-secondary);
    padding: 4px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    transition: all var(--transition);
}

.toolbar-btn:hover {
    color: var(--text-primary);
    background: var(--bg-tertiary);
}

.toolbar-btn.active {
    color: var(--accent);
    background: rgba(88, 166, 255, 0.1);
}

.toolbar-separator {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
}

.editor-area {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

#editor-container {
    flex: 1;
    overflow: auto;
}

#editor-container .cm-editor {
    height: 100%;
    background: var(--bg-primary);
}

#editor-container .cm-content {
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--text-primary);
    padding: 16px;
}

#editor-container .cm-gutters {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    color: var(--text-muted);
}

#editor-container .cm-activeLine {
    background: rgba(88, 166, 255, 0.05);
}

#editor-container .cm-selectionBackground {
    background: rgba(88, 166, 255, 0.2) !important;
}

#editor-container .cm-cursor {
    border-left-color: var(--accent);
}

#preview-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: none;
}

#preview-container img {
    max-width: 100%;
    border-radius: var(--radius);
    cursor: pointer;
}

#preview-container h1, #preview-container h2, #preview-container h3 {
    color: var(--text-primary);
    margin: 16px 0 8px 0;
}

#preview-container p { margin-bottom: 12px; }
#preview-container code {
    background: var(--bg-tertiary);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 13px;
}

#preview-container pre {
    background: var(--bg-secondary);
    padding: 12px;
    border-radius: var(--radius);
    overflow-x: auto;
}

#preview-container pre code {
    background: none;
    padding: 0;
}

.panel-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}

.privacy-note {
    font-size: 11px;
    color: var(--text-muted);
}

/* ========== Modal ========== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal-overlay.hidden { display: none; }

.modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 420px;
    max-width: 90vw;
}

.modal h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
}

.modal .tagline {
    color: var(--text-secondary);
    font-size: 13px;
    margin-bottom: 24px;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
}

.form-group input,
.form-group select {
    width: 100%;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 14px;
    outline: none;
    transition: border-color var(--transition);
}

.form-group input:focus,
.form-group select:focus {
    border-color: var(--accent);
}

.form-group input::placeholder {
    color: var(--text-muted);
}

.modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 24px;
}

.modal-actions .btn {
    flex: 1;
    justify-content: center;
    padding: 10px 16px;
    font-size: 14px;
}

/* ========== Confirm Dialog ========== */
.confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1001;
}

.confirm-overlay.hidden { display: none; }

.confirm-dialog {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 360px;
    max-width: 90vw;
}

.confirm-dialog p {
    margin-bottom: 16px;
    color: var(--text-primary);
}

.confirm-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ========== Responsive ========== */
@media (max-width: 768px) {
    .sidebar { width: 0; border-right: none; }
    .panels { flex-direction: column; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>

<div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebar-title">Sessions</h2>
            <button class="toolbar-btn" onclick="showNewSessionModal()" title="New">+</button>
        </div>
        <div class="sidebar-list" id="sessions-list">
            <div class="sidebar-empty" id="no-sessions">No sessions yet</div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
                <span class="logo">Steno</span>
            </div>
            <div class="header-center">
                <span class="session-title" id="session-title">—</span>
                <span class="session-clock" id="session-clock">00:00:00</span>
            </div>
            <div class="header-right">
                <span class="connection-dot" id="connection-dot"></span>
                <button class="lang-toggle" id="lang-toggle" onclick="toggleLanguage()">EN</button>
            </div>
        </header>

        <!-- Panels -->
        <div class="panels">
            <!-- Left: Transcript -->
            <div class="panel panel-left">
                <div class="panel-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div class="status-badge" id="status-badge">
                            <span class="dot gray"></span>
                            <span id="status-text">No active session</span>
                        </div>
                    </div>
                    <div class="controls">
                        <select class="mic-select" id="mic-select"></select>
                        <button class="btn btn-primary" id="record-btn" onclick="toggleRecording()" disabled>
                            <span id="record-btn-text">Start Recording</span>
                        </button>
                    </div>
                </div>
                <div class="audio-level">
                    <div class="audio-level-bar" id="audio-level-bar"></div>
                </div>
                <div class="transcript-area" id="transcript-area"></div>
            </div>

            <!-- Right: Notes -->
            <div class="panel panel-right">
                <div class="panel-header">
                    <h3 id="notes-title">Notes</h3>
                    <div class="notes-toolbar">
                        <button class="toolbar-btn" onclick="insertFormat('**', '**')" title="Bold"><b>B</b></button>
                        <button class="toolbar-btn" onclick="insertFormat('*', '*')" title="Italic"><i>I</i></button>
                        <button class="toolbar-btn" onclick="insertFormat('`', '`')" title="Code"><code>{ }</code></button>
                        <span class="toolbar-separator"></span>
                        <label class="toolbar-btn" title="Insert image" id="insert-image-label">
                            &#128247;
                            <input type="file" accept="image/*" style="display:none" id="image-input" onchange="handleImageUpload(event)">
                        </label>
                        <span class="toolbar-separator"></span>
                        <button class="toolbar-btn" id="btn-save-note" onclick="saveNote()">&#128190; <span data-i18n="save_note">Save Note</span></button>
                        <button class="toolbar-btn" id="btn-preview" onclick="togglePreview()">&#128065; <span data-i18n="preview">Preview</span></button>
                    </div>
                </div>
                <div class="editor-area">
                    <div id="editor-container"></div>
                    <div id="preview-container"></div>
                </div>
                <div class="panel-footer">
                    <span class="privacy-note" id="privacy-note">All processing is local. No data leaves your machine.</span>
                    <button class="btn btn-ghost" id="export-btn" onclick="exportSession()" disabled>
                        <span data-i18n="export_session">Export session (.md)</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- New Session Modal -->
<div class="modal-overlay" id="session-modal">
    <div class="modal">
        <h2 id="modal-title">New Session</h2>
        <p class="tagline" id="modal-tagline">Real-time transcription for classes & meetings</p>
        <div class="form-group">
            <label data-i18n="new_session" for="session-name-input">Session name</label>
            <input type="text" id="session-name-input" placeholder="e.g. Physics — Thermodynamics">
        </div>
        <div class="form-group">
            <label data-i18n="select_microphone" for="modal-mic-select">Select microphone</label>
            <select id="modal-mic-select"></select>
        </div>
        <div class="form-group">
            <label data-i18n="language" for="modal-lang-select">Language</label>
            <select id="modal-lang-select">
                <option value="en">English</option>
                <option value="es">Español</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-primary" onclick="startSession()" id="start-session-btn">Start Session</button>
        </div>
        <p class="privacy-note" style="margin-top:16px;text-align:center" id="modal-privacy">
            All processing is local. No data leaves your machine.
        </p>
    </div>
</div>

<!-- Confirm Delete Dialog -->
<div class="confirm-overlay hidden" id="confirm-overlay">
    <div class="confirm-dialog">
        <p id="confirm-message">Are you sure?</p>
        <div class="confirm-actions">
            <button class="btn btn-ghost" onclick="hideConfirm()" id="confirm-cancel-btn">Cancel</button>
            <button class="btn btn-danger" onclick="confirmAction()" id="confirm-delete-btn">Delete</button>
        </div>
    </div>
</div>

<!-- CodeMirror 6 via ESM CDN -->
<script type="module">
import {EditorView, basicSetup} from "https://cdn.jsdelivr.net/npm/codemirror@6/dist/index.js";
import {markdown} from "https://cdn.jsdelivr.net/npm/@codemirror/lang-markdown@6/dist/index.js";
import {EditorState} from "https://cdn.jsdelivr.net/npm/@codemirror/state@6/dist/index.js";
import {oneDark} from "https://cdn.jsdelivr.net/npm/@codemirror/theme-one-dark@6/dist/index.js";

const darkTheme = EditorView.theme({
    "&": { backgroundColor: "#0d1117", color: "#e6edf3" },
    ".cm-content": { caretColor: "#58a6ff", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" },
    ".cm-gutters": { backgroundColor: "#161b22", color: "#484f58", borderRight: "1px solid #30363d" },
    "&.cm-focused .cm-selectionBackground, .cm-selectionBackground": { backgroundColor: "rgba(88,166,255,0.2)" },
    ".cm-activeLine": { backgroundColor: "rgba(88,166,255,0.05)" },
    ".cm-cursor": { borderLeftColor: "#58a6ff" },
});

const state = EditorState.create({
    doc: "",
    extensions: [
        basicSetup,
        markdown(),
        darkTheme,
        EditorView.lineWrapping,
    ],
});

const editor = new EditorView({
    state,
    parent: document.getElementById("editor-container"),
});

// Expose editor globally
window.cmEditor = editor;

// Drag & drop images onto editor
editor.dom.addEventListener("dragover", (e) => { e.preventDefault(); });
editor.dom.addEventListener("drop", (e) => {
    e.preventDefault();
    const files = e.dataTransfer?.files;
    if (files && files.length > 0) {
        for (const file of files) {
            if (file.type.startsWith("image/")) {
                uploadImageFile(file);
            }
        }
    }
});
</script>

<script>
/* ========== Global State ========== */
let t = {};
let currentLang = "en";
let currentSessionId = null;
let ws = null;
let isRecording = false;
let isPreviewMode = false;
let reconnectTimeout = null;
let reconnectDelay = 1000;
let clockInterval = null;
let sessionStartTime = null;
let pendingConfirmAction = null;

/* ========== i18n ========== */
async function loadI18n(lang) {
    try {
        const resp = await fetch(`/api/i18n/${lang}`);
        t = await resp.json();
        currentLang = lang;
        applyI18n();
    } catch (e) {
        console.error("Failed to load i18n:", e);
    }
}

function applyI18n() {
    // Update elements with data-i18n attribute
    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (t[key]) el.textContent = t[key];
    });

    // Update specific elements
    document.getElementById("sidebar-title").textContent = t.sessions || "Sessions";
    document.getElementById("no-sessions").textContent = t.no_sessions_yet || "No sessions yet";
    document.getElementById("modal-title").textContent = t.new_session || "New Session";
    document.getElementById("modal-tagline").textContent = t.tagline || "";
    document.getElementById("session-name-input").placeholder = t.session_name_placeholder || "";
    document.getElementById("start-session-btn").textContent = t.start_session || "Start Session";
    document.getElementById("modal-privacy").textContent = t.privacy_note || "";
    document.getElementById("privacy-note").textContent = t.privacy_note || "";
    document.getElementById("notes-title").textContent = "Notes";
    document.getElementById("insert-image-label").title = t.insert_image || "Insert image";
    document.getElementById("confirm-cancel-btn").textContent = t.cancel || "Cancel";
    document.getElementById("confirm-delete-btn").textContent = t.delete || "Delete";

    // Update lang toggle button
    document.getElementById("lang-toggle").textContent = currentLang.toUpperCase();

    // Update status & record button
    updateStatusUI();
    updateRecordButton();
}

function toggleLanguage() {
    const newLang = currentLang === "en" ? "es" : "en";
    loadI18n(newLang);
}

/* ========== Devices ========== */
async function loadDevices() {
    try {
        const resp = await fetch("/api/devices");
        const devices = await resp.json();
        const selects = [document.getElementById("mic-select"), document.getElementById("modal-mic-select")];
        selects.forEach(select => {
            select.innerHTML = "";
            devices.forEach(d => {
                const opt = document.createElement("option");
                opt.value = d.index;
                opt.textContent = d.name;
                select.appendChild(opt);
            });
            if (devices.length === 0) {
                const opt = document.createElement("option");
                opt.textContent = t.select_microphone || "No microphone found";
                select.appendChild(opt);
            }
        });
    } catch (e) {
        console.error("Failed to load devices:", e);
    }
}

/* ========== Sessions ========== */
async function loadSessions() {
    try {
        const resp = await fetch("/api/sessions");
        const sessions = await resp.json();
        const list = document.getElementById("sessions-list");
        const empty = document.getElementById("no-sessions");

        if (sessions.length === 0) {
            list.innerHTML = "";
            list.appendChild(empty);
            empty.style.display = "";
            return;
        }

        empty.style.display = "none";
        list.innerHTML = "";

        sessions.forEach(s => {
            const item = document.createElement("div");
            item.className = "sidebar-item";
            item.innerHTML = `
                <div class="session-name">${escapeHtml(s.name)}</div>
                <div class="session-date">${s.created_at ? new Date(s.created_at).toLocaleDateString() : ""} · ${s.size_kb} KB</div>
            `;
            item.onclick = () => viewSession(s.id);

            // Right-click to delete
            item.oncontextmenu = (e) => {
                e.preventDefault();
                showConfirm(t.confirm_delete || "Are you sure you want to delete this session?", () => deleteSession(s.id));
            };

            list.appendChild(item);
        });
    } catch (e) {
        console.error("Failed to load sessions:", e);
    }
}

async function deleteSession(id) {
    try {
        await fetch(`/api/sessions/${id}`, { method: "DELETE" });
        loadSessions();
    } catch (e) {
        console.error("Failed to delete session:", e);
    }
}

async function viewSession(id) {
    try {
        const resp = await fetch(`/api/sessions/${id}`);
        const md = await resp.text();
        const previewEl = document.getElementById("preview-container");
        previewEl.innerHTML = marked.parse(md);
        showPreview(true);
    } catch (e) {
        console.error("Failed to view session:", e);
    }
}

function showNewSessionModal() {
    document.getElementById("session-modal").classList.remove("hidden");
}

async function startSession() {
    const name = document.getElementById("session-name-input").value.trim();
    if (!name) {
        document.getElementById("session-name-input").focus();
        return;
    }

    // Apply selected language
    const langSelect = document.getElementById("modal-lang-select");
    if (langSelect.value !== currentLang) {
        await loadI18n(langSelect.value);
    }

    try {
        const resp = await fetch("/api/sessions/new", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
        });
        const data = await resp.json();
        currentSessionId = data.session_id;

        // Update UI
        document.getElementById("session-title").textContent = name;
        document.getElementById("session-modal").classList.add("hidden");
        document.getElementById("record-btn").disabled = false;
        document.getElementById("export-btn").disabled = false;

        // Start clock
        sessionStartTime = new Date();
        startClock();

        // Connect WebSocket
        connectWebSocket();

        // Reload sidebar
        loadSessions();

        // Sync mic selection
        const micSelect = document.getElementById("mic-select");
        const modalMic = document.getElementById("modal-mic-select");
        micSelect.value = modalMic.value;

    } catch (e) {
        console.error("Failed to create session:", e);
    }
}

/* ========== WebSocket ========== */
function connectWebSocket() {
    if (!currentSessionId) return;

    const protocol = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${protocol}//${location.host}/ws/${currentSessionId}`);

    ws.onopen = () => {
        reconnectDelay = 1000;
        setConnectionStatus(true);
    };

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleWSMessage(msg);
    };

    ws.onclose = () => {
        setConnectionStatus(false);
        scheduleReconnect();
    };

    ws.onerror = () => {
        ws.close();
    };
}

function scheduleReconnect() {
    if (!currentSessionId) return;
    if (reconnectTimeout) clearTimeout(reconnectTimeout);
    reconnectTimeout = setTimeout(() => {
        connectWebSocket();
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    }, reconnectDelay);
}

function handleWSMessage(msg) {
    switch (msg.type) {
        case "transcript":
            addTranscriptEntry(msg.text, msg.timestamp);
            break;
        case "status":
            isRecording = msg.recording;
            updateStatusUI();
            updateRecordButton();
            break;
        case "model_loading":
            setModelStatus("loading");
            break;
        case "model_ready":
            setModelStatus("ready");
            break;
        case "error":
            console.error("WS error:", msg.message);
            break;
        case "pong":
            break;
    }
}

function setConnectionStatus(connected) {
    const dot = document.getElementById("connection-dot");
    dot.className = "connection-dot " + (connected ? "connected" : "disconnected");
}

function setModelStatus(status) {
    const badge = document.getElementById("status-badge");
    const text = document.getElementById("status-text");
    if (status === "loading") {
        badge.querySelector(".dot").className = "dot";
        badge.querySelector(".dot").style.background = "var(--yellow)";
        text.textContent = t.model_loading || "Loading model...";
    } else if (status === "ready") {
        badge.querySelector(".dot").className = "dot green";
        badge.querySelector(".dot").style.background = "";
        text.textContent = t.model_ready || "Model ready";
    }
}

/* ========== Recording ========== */
function toggleRecording() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    if (isRecording) {
        ws.send(JSON.stringify({ type: "stop" }));
    } else {
        const deviceIndex = parseInt(document.getElementById("mic-select").value);
        ws.send(JSON.stringify({ type: "start", device_index: isNaN(deviceIndex) ? null : deviceIndex }));
    }
}

function updateRecordButton() {
    const btn = document.getElementById("record-btn");
    const text = document.getElementById("record-btn-text");
    if (isRecording) {
        btn.className = "btn btn-danger";
        text.textContent = t.stop_recording || "Stop Recording";
    } else {
        btn.className = "btn btn-primary";
        text.textContent = t.start_recording || "Start Recording";
    }
}

function updateStatusUI() {
    const dot = document.getElementById("status-badge").querySelector(".dot");
    const text = document.getElementById("status-text");

    if (!currentSessionId) {
        dot.className = "dot gray";
        text.textContent = t.no_session || "No active session";
    } else if (isRecording) {
        dot.className = "dot green";
        text.textContent = t.listening || "Listening";
    } else {
        dot.className = "dot red";
        text.textContent = t.paused || "Paused";
    }
}

/* ========== Transcript ========== */
function addTranscriptEntry(text, timestamp) {
    const area = document.getElementById("transcript-area");
    const entry = document.createElement("div");
    entry.className = "transcript-entry";
    entry.innerHTML = `<span class="timestamp">[${escapeHtml(timestamp)}]</span><span class="text">${escapeHtml(text)}</span>`;
    area.appendChild(entry);
    area.scrollTop = area.scrollHeight;
}

/* ========== Notes ========== */
function insertFormat(before, after) {
    const editor = window.cmEditor;
    if (!editor) return;

    const { from, to } = editor.state.selection.main;
    const selectedText = editor.state.sliceDoc(from, to);
    const replacement = before + selectedText + after;

    editor.dispatch({
        changes: { from, to, insert: replacement },
        selection: { anchor: from + before.length, head: from + before.length + selectedText.length },
    });
    editor.focus();
}

async function saveNote() {
    if (!currentSessionId) return;
    const editor = window.cmEditor;
    if (!editor) return;

    const md = editor.state.doc.toString();
    if (!md.trim()) return;

    try {
        await fetch(`/api/sessions/${currentSessionId}/note`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ markdown: md }),
        });
    } catch (e) {
        console.error("Failed to save note:", e);
    }
}

function togglePreview() {
    isPreviewMode = !isPreviewMode;
    showPreview(isPreviewMode);
}

function showPreview(show) {
    const editorContainer = document.getElementById("editor-container");
    const previewContainer = document.getElementById("preview-container");
    const previewBtn = document.getElementById("btn-preview");

    if (show) {
        const editor = window.cmEditor;
        const md = editor ? editor.state.doc.toString() : "";
        previewContainer.innerHTML = marked.parse(md);
        editorContainer.style.display = "none";
        previewContainer.style.display = "block";
        previewBtn.querySelector("span").textContent = t.edit || "Edit";
        isPreviewMode = true;
    } else {
        editorContainer.style.display = "block";
        previewContainer.style.display = "none";
        previewBtn.querySelector("span").textContent = t.preview || "Preview";
        isPreviewMode = false;
    }
}

/* ========== Image Upload ========== */
function handleImageUpload(event) {
    const file = event.target.files[0];
    if (file) uploadImageFile(file);
    event.target.value = "";
}

async function uploadImageFile(file) {
    if (!currentSessionId) return;

    const formData = new FormData();
    formData.append("file", file);
    formData.append("caption", file.name);

    try {
        const resp = await fetch(`/api/sessions/${currentSessionId}/image`, {
            method: "POST",
            body: formData,
        });
        const data = await resp.json();

        // Insert the markdown tag into the editor
        const editor = window.cmEditor;
        if (editor && data.tag) {
            const pos = editor.state.selection.main.head;
            editor.dispatch({
                changes: { from: pos, insert: "\n" + data.tag + "\n" },
            });
        }
    } catch (e) {
        console.error("Failed to upload image:", e);
    }
}

/* ========== Export ========== */
async function exportSession() {
    if (!currentSessionId) return;

    try {
        const resp = await fetch(`/api/sessions/${currentSessionId}/export`, { method: "POST" });
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${currentSessionId}.md`;
        a.click();
        URL.revokeObjectURL(url);
    } catch (e) {
        console.error("Failed to export session:", e);
    }
}

/* ========== Clock ========== */
function startClock() {
    if (clockInterval) clearInterval(clockInterval);
    clockInterval = setInterval(() => {
        if (!sessionStartTime) return;
        const elapsed = Math.floor((Date.now() - sessionStartTime.getTime()) / 1000);
        const h = String(Math.floor(elapsed / 3600)).padStart(2, "0");
        const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, "0");
        const s = String(elapsed % 60).padStart(2, "0");
        document.getElementById("session-clock").textContent = `${h}:${m}:${s}`;
    }, 1000);
}

/* ========== Sidebar ========== */
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
}

/* ========== Confirm Dialog ========== */
function showConfirm(message, action) {
    document.getElementById("confirm-message").textContent = message;
    document.getElementById("confirm-overlay").classList.remove("hidden");
    pendingConfirmAction = action;
}

function hideConfirm() {
    document.getElementById("confirm-overlay").classList.add("hidden");
    pendingConfirmAction = null;
}

function confirmAction() {
    if (pendingConfirmAction) pendingConfirmAction();
    hideConfirm();
}

/* ========== Utility ========== */
function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
}

/* ========== Init ========== */
async function init() {
    // Detect language
    const browserLang = (navigator.language || "en").split("-")[0];
    const lang = ["en", "es"].includes(browserLang) ? browserLang : "en";

    // Set modal language selector
    document.getElementById("modal-lang-select").value = lang;

    // Load i18n and devices in parallel
    await Promise.all([
        loadI18n(lang),
        loadDevices(),
        loadSessions(),
    ]);
}

init();
</script>
